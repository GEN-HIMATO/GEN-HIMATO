<svg width="100%" height="120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .text {
      font-family: monospace;
      font-size: 60px;
      font-weight: bold;
      fill: url(#gradient);
      stroke: url(#gradient);
      stroke-width: 1;
      stroke-dasharray: 500;
      stroke-dashoffset: 500;
      animation: typing 3s steps(12) forwards, glow 2s infinite alternate;
    }

    @keyframes typing {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes glow {
      from {
        filter: drop-shadow(0 0 5px #00ffff);
      }
      to {
        filter: drop-shadow(0 0 20px #ff00ff);
      }
    }
  </style>

  <defs>
    <linearGradient id="gradient" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="400" y2="0">
      <stop offset="0%" stop-color="#00f1dc">
        <animate attributeName="stop-color" values="#00f1dc;#5673f1;#fe00ff;#00f1dc" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#5673f1">
        <animate attributeName="stop-color" values="#5673f1;#fe00ff;#00f1dc;#5673f1" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#fe00ff">
        <animate attributeName="stop-color" values="#fe00ff;#00f1dc;#5673f1;#fe00ff" dur="5s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <text x="50%" y="70%" text-anchor="middle" class="text">
    GEN K3RNEL
  </text>
</svg>
