.rgb-text {
  font-family: monospace;
  font-size: 3rem;
  font-weight: bold;
  white-space: nowrap;
  overflow: hidden;
  border-right: 3px solid white;
  width: 0;

  /* RGB gradient */
  background: linear-gradient(
    90deg,
    #ff0000,
    #ff7300,
    #fff200,
    #00ff00,
    #00ffff,
    #0040ff,
    #ff00ff,
    #ff0000
  );

  background-size: 400%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  /* animations */
  animation: 
    typing 2.5s steps(12) forwards,
    blink 0.6s step-end infinite,
    rgbFlow 6s linear infinite;

  /* glow */
  text-shadow:
    0 0 5px #ff0000,
    0 0 10px #00ffff,
    0 0 20px #ff00ff;
}

/* typing effect */
@keyframes typing {
  from { width: 0 }
  to { width: 12ch }
}

/* cursor blink */
@keyframes blink {
  50% { border-color: transparent }
}

/* moving RGB */
@keyframes rgbFlow {
  0% { background-position: 0% }
  100% { background-position: 400% }
}
